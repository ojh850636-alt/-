name: CI — write .env from repo secrets

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  write-env-from-secrets:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env non-interactively from repo secrets
        shell: pwsh
        env:
          # ensure no accidental printing from script; values are provided via args
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          Set-Location ${{ github.workspace }}
          # Call the main store_keys script in non-interactive mode with secrets passed as args.
          .\store_keys.ps1 -NonInteractive -OpenAIKey "${{ secrets.OPENAI_API_KEY }}" -GroqKey "${{ secrets.GROQ_API_KEY }}" -Port 8002 -LocalIP "127.0.0.1"
