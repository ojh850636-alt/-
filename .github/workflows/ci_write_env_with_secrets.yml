name: CI — write .env from repo secrets

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  write-env-from-secrets:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env non-interactively from repo secrets (wrapper)
        shell: pwsh
        env:
          # expose secrets to the process environment; wrapper will call writer reading env vars
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          Set-Location ${{ github.workspace }}\tools
          # Use CI wrapper which sets env vars (or clears them) and calls the non-interactive writer
          .\write_env_ci_wrapper.ps1 -Port 8002 -LocalIP "127.0.0.1"
