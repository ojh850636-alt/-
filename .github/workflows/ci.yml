name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: CI

    on:
      push:
        branches: [ main, master, fix/quick-start ]
      pull_request:
        branches: [ main, master ]

    jobs:
      test:
        runs-on: ${{ matrix.os }}
        strategy:
          matrix:
            os: [ubuntu-latest, windows-latest]
            python-version: [3.11]

        steps:
          - uses: actions/checkout@v4

          - name: Set up Python
            uses: actions/setup-python@v4
            with:
              python-version: ${{ matrix.python-version }}

          - name: Cache pip
            uses: actions/cache@v4
            with:
              path: ~/.cache/pip
              key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
              restore-keys: |
                ${{ runner.os }}-pip-

          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          - name: Ensure clean usage file
            run: |
              rm -f ai_usage.json || true

          - name: Run tests
            run: |
              # Treat DeprecationWarning as errors in CI to surface pydantic deprecations
              python -W error -m pytest -q

          - name: List small diagnostics
            run: |
              python -V
              pip freeze | head -n 40
      - name: Run tests (fail on warnings)
